<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRONMAN Florida 2026 · Training Calendar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8002D;--red-d:#a5001f;--bg:#080808;--s1:#101010;--s2:#181818;--s3:#222;
  --border:#2a2a2a;--border2:#363636;--text:#f0eeea;--muted:#888;--dim:#444;
  --swim:#38BDF8;--swim-d:#0c2d3e;--bike:#FCD34D;--bike-d:#2d2008;
  --run:#F87171;--run-d:#2d1010;--cf:#4ADE80;--cf-d:#0d2018;
  --brick:#C084FC;--brick-d:#1e1030;--ar:#9CA3AF;--ar-d:#1c1c1c;
  --swimrun:#38BDF8;--swimrun-d:#0c2d3e;--race:#E8002D;--race-d:#2a0009;
  --oswald:'Oswald',sans-serif;--mono:'DM Mono',monospace;--body:'DM Sans',sans-serif;
}
body{font-family:var(--body);background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* ── Top panel ── */
.top-panel{display:grid;grid-template-columns:260px 1fr 340px;gap:12px;padding:16px;background:var(--s1);border-bottom:2px solid var(--red);margin-bottom:0}
.panel-hdr{font-family:var(--oswald);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:10px;font-weight:600}

/* Stats column */
.stats-col{display:flex;flex-direction:column;gap:8px}
.race-title{font-family:var(--oswald);font-size:22px;font-weight:700;color:#fff;letter-spacing:.04em;line-height:1}
.race-sub{font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.05em}
.race-countdown{font-family:var(--mono);font-size:28px;color:var(--red);font-weight:500;margin-top:4px;line-height:1}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.stat-card{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:8px 10px}
.stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px}
.stat-val{font-family:var(--mono);font-size:15px;font-weight:500}
.stat-card.swim .stat-val{color:var(--swim)}.stat-card.bike .stat-val{color:var(--bike)}
.stat-card.run .stat-val{color:var(--run)}.stat-card.total .stat-val{color:var(--red)}
.progress-wrap{margin-top:4px}
.progress-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px}
.progress-track{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--red);border-radius:99px;transition:width .4s}

/* Today / Tomorrow */
.today-col,.tomorrow-col{display:flex;flex-direction:column;gap:8px}
.session-preview{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.sp-header{padding:10px 12px 8px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sp-body{flex:1;overflow-y:auto;padding:10px 12px;max-height:240px}
.sp-body::-webkit-scrollbar{width:4px}.sp-body::-webkit-scrollbar-track{background:transparent}.sp-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
.sp-none{padding:20px;text-align:center;color:var(--dim);font-size:13px}

/* Log form */
.log-form{background:var(--s3);border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0}
.log-form-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.log-check{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer}
.log-check input[type=checkbox]{width:14px;height:14px;accent-color:var(--red);cursor:pointer}
.log-input{padding:5px 8px;background:var(--s1);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--mono);width:80px;outline:none}
.log-input:focus{border-color:var(--red)}
.log-input.time-input{width:70px}
.log-btn{padding:5px 12px;background:var(--red);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--oswald);letter-spacing:.05em}
.log-btn:hover{background:var(--red-d)}
.log-unit{font-size:10px;color:var(--muted)}
.completed-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);border-radius:99px;font-size:11px;color:#4ADE80;font-weight:600}

/* ── Main wrapper ── */
.main-wrap{max-width:1400px;margin:0 auto;padding:0 12px 40px}

/* ── Phase banner ── */
.phase-banner{padding:12px 16px;display:flex;align-items:center;gap:12px;margin:20px 0 8px;border-radius:8px}
.phase-name{font-family:var(--oswald);font-size:22px;font-weight:700;letter-spacing:.04em}
.phase-weeks{font-size:12px;color:rgba(255,255,255,.7);font-weight:500}
.phase-bar{flex:1;height:2px;background:rgba(255,255,255,.2);border-radius:99px}

/* ── Week row ── */
.week-row{margin-bottom:8px}
.week-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;padding:4px 8px;margin-bottom:4px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.day-col{display:flex;flex-direction:column;gap:4px;min-height:80px}
.day-header{font-size:9px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;padding:2px 0;text-align:center}

/* ── Session cards ── */
.session-card{background:var(--s2);border-radius:8px;border:1px solid var(--border);padding:8px 9px;cursor:pointer;transition:border-color .12s,transform .1s;position:relative;user-select:none}
.session-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.session-card.dragging{opacity:.5;transform:scale(.96)}
.session-card.drag-over{border-color:var(--red);background:rgba(232,0,45,.05)}
.session-card.done{opacity:.7}
.session-card.done::after{content:'✓';position:absolute;top:5px;right:7px;font-size:10px;font-weight:700;color:#4ADE80}
.sc-top{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.sc-badge{font-family:var(--oswald);font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.06em;flex-shrink:0}
.sc-title{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.sc-s1{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.sc-s2{font-size:9px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Race day card ── */
.race-day-card{background:linear-gradient(135deg,#2a0009,#1a0a00);border:2px solid var(--red);border-radius:8px;padding:10px 12px;cursor:pointer;text-align:center;position:relative;overflow:hidden}
.race-day-card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(232,0,45,.03) 10px,rgba(232,0,45,.03) 20px)}
.rdc-label{font-family:var(--oswald);font-size:11px;color:var(--red);letter-spacing:.15em;margin-bottom:3px}
.rdc-title{font-family:var(--oswald);font-size:16px;font-weight:700;color:#fff;letter-spacing:.04em}
.rdc-sub{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Drag placeholder ── */
.drop-placeholder{border:1.5px dashed var(--border2);border-radius:8px;height:70px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--dim);transition:all .12s}
.drop-placeholder.active{border-color:var(--red);background:rgba(232,0,45,.04);color:var(--red)}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;backdrop-filter:blur(3px)}
.modal-overlay.hidden{display:none}
.modal-card{background:var(--s1);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:700px;overflow:hidden;margin:auto}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--s2)}
.modal-title{font-family:var(--oswald);font-size:20px;font-weight:700;letter-spacing:.04em;flex:1}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--s3);border:1px solid var(--border2);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{color:var(--text);border-color:var(--text)}
.modal-body{padding:20px;overflow-y:auto;max-height:75vh}
.modal-body::-webkit-scrollbar{width:5px}.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* ── Detail HTML styles (inside cards and modal) ── */
.chip{display:inline-block;padding:3px 8px;border-radius:4px;background:var(--s3);border:1px solid var(--border2);font-family:var(--mono);font-size:11px;color:var(--muted);margin:0 3px 6px 0}
.t-block{margin-bottom:12px;border-left:2px solid var(--border2);padding-left:10px}
.t-lbl{font-family:var(--oswald);font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.t-body p{font-size:12px;color:#ccc;line-height:1.65;margin-bottom:4px}
.t-block:has(.i-row){border-color:var(--red)}
.i-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap}
.i-desc{font-size:12px;font-weight:600;color:var(--text)}
.z-tag{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;background:rgba(232,0,45,.15);color:var(--red);border:1px solid rgba(232,0,45,.3)}
.i-rest{font-size:10px;color:var(--muted)}
.i-note{font-size:11px;color:var(--dim);font-style:italic;margin-top:2px;margin-bottom:6px}
.coach-note{background:rgba(232,0,45,.07);border:1px solid rgba(232,0,45,.2);border-radius:6px;padding:10px 12px;display:flex;gap:8px;margin-top:10px}
.coach-note span{font-size:16px;flex-shrink:0}
.coach-note p{font-size:12px;color:#ddd;line-height:1.65}
.nutr-note{background:rgba(252,211,77,.07);border:1px solid rgba(252,211,77,.2);border-radius:6px;padding:10px 12px;display:flex;gap:8px;margin-top:8px}
.nutr-note span{font-size:16px;flex-shrink:0}
.nutr-note p{font-size:12px;color:#ddd;line-height:1.65}
.watts-note{font-size:10px;color:var(--dim);margin-top:8px;padding:6px 10px;background:var(--s3);border-radius:4px;border-left:2px solid var(--dim)}

/* Type color badges */
.badge-swim{background:rgba(56,189,248,.15);color:var(--swim);border-color:rgba(56,189,248,.3)}
.badge-bike{background:rgba(252,211,77,.15);color:var(--bike);border-color:rgba(252,211,77,.3)}
.badge-run{background:rgba(248,113,113,.15);color:var(--run);border-color:rgba(248,113,113,.3)}
.badge-cf{background:rgba(74,222,128,.15);color:var(--cf);border-color:rgba(74,222,128,.3)}
.badge-brick{background:rgba(192,132,252,.15);color:var(--brick);border-color:rgba(192,132,252,.3)}
.badge-ar{background:rgba(156,163,175,.15);color:var(--ar);border-color:rgba(156,163,175,.3)}
.badge-swimrun{background:rgba(56,189,248,.15);color:var(--swim);border-color:rgba(56,189,248,.3)}
.badge-race{background:rgba(232,0,45,.2);color:var(--red);border-color:rgba(232,0,45,.4)}

@media(max-width:1000px){.top-panel{grid-template-columns:1fr 1fr;}.stats-col{grid-column:1/-1}}
@media(max-width:700px){.top-panel{grid-template-columns:1fr}.week-grid{grid-template-columns:repeat(4,1fr)}.day-col:last-child{display:none}}
</style>
</head>
<body>

<!-- Top Panel -->
<div class="top-panel">
  <!-- Stats -->
  <div class="stats-col">
    <div>
      <div class="race-title">IRONMAN<br>FLORIDA</div>
      <div class="race-sub">Panama City Beach · November 7, 2026</div>
      <div class="race-countdown" id="countdown">— days</div>
    </div>
    <div>
      <div class="panel-hdr">Training Totals</div>
      <div class="stat-grid">
        <div class="stat-card swim"><div class="stat-label">Swim</div><div class="stat-val" id="stat-swim">0 yds</div></div>
        <div class="stat-card bike"><div class="stat-label">Bike</div><div class="stat-val" id="stat-bike">0 mi</div></div>
        <div class="stat-card run"><div class="stat-label">Run</div><div class="stat-val" id="stat-run">0 mi</div></div>
        <div class="stat-card total"><div class="stat-label">Total Time</div><div class="stat-val" id="stat-time">0:00 hrs</div></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-lbl"><span>Progress</span><span id="prog-text">0 / 0</span></div>
        <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
    </div>
  </div>

  <!-- Today -->
  <div class="today-col">
    <div class="panel-hdr">Today's Workout</div>
    <div class="session-preview">
      <div id="today-content"></div>
    </div>
  </div>

  <!-- Tomorrow -->
  <div class="tomorrow-col">
    <div class="panel-hdr">Tomorrow</div>
    <div class="session-preview">
      <div id="tomorrow-content"></div>
    </div>
  </div>
</div>

<!-- Calendar -->
<div class="main-wrap">
  <div id="calendar"></div>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal-card">
    <div class="modal-header">
      <span id="modal-badge"></span>
      <div style="flex:1">
        <div class="modal-title" id="modal-title"></div>
        <div style="font-size:11px;color:var(--muted)" id="modal-meta"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div style="padding:0 20px 20px" id="modal-log"></div>
  </div>
</div>

<script>
const PLAN = [{"id": "w1-sat", "week": 1, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-05-23", "dayName": "SAT", "type": "bike", "title": "Wk 1 · Long Ride", "summary1": "90 min · Z2 · 135–150 BPM · ~105–140W est. ·...", "summary2": "Domane debut · note average speed", "detail": "<span class=\"chip\">90 min</span><span class=\"chip\">~22 mi</span><span class=\"chip\">Z2 · 135–150 BPM · ~105–140W est. · DOMANE DEBUT</span><div class=\"t-block \"><div class=\"t-lbl\">WARM-UP · 15 min</div><div class=\"t-body\"><p>15 min Z1 (104–134 BPM). Practice clipping in and out — do this 20+ times in a parking lot before heading out. Get comfortable with the clipless system.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 60 min</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">60 min continuous</span><span class=\"z-tag\">Z2 · 135–150 BPM · ~105–140W</span></div><p class=\"i-note\">Flat route preferred. Focus on: smooth pedal stroke, comfortable position on the drops/hoods, and relaxed hands and shoulders.</p></p><p>Cadence target: 85–95 RPM. If you're grinding in a big gear, shift down. Spinning efficiently is more important than speed right now.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 15 min</div><div class=\"t-body\"><p>15 min easy Z1. Practice clipping out before you stop — every time.</p></div></div><div class=\"watts-note\">★ Watts estimated from modeled FTP ~200W. Calibrate once power meter installed.</div>⭐ First ride on the Domane with clipless pedals. This session establishes your bike baseline. Note your average speed — this will be your first Domane data point. Falling is common with clipless pedals, especially at stops. Clip out 100 meters before every stop.", "targetDuration": 90, "targetDistance": null, "unit": "mi"}, {"id": "w1-sun", "week": 1, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-05-24", "dayName": "SUN", "type" ss=\"t-body\"><p>Strength: 4×4 deadlift at 80% + 3×6 strict pull-ups. Metcon: 12-min AMRAP — 5 power cleans (moderate), 10 push-ups, 200m row.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Big training weeks demand intelligent CrossFit. Strength over conditioning this week.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w5-tue", "week": 5, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-06-23", "dayName": "TUE", "type": "swim", "title": "Swim Tue", "summary1": "~3,500 yds · Z2–Z3", "summary2": "10×200 yds Z2–Z3 · first big set", "detail": "<span class=\"chip\">~3,500 yds</span><span class=\"chip\">85–100 min</span><span class=\"chip\">Z2–Z3</span><div class=\"t-block \"><div class=\"t-lbl\">WARM-UP · 600 yds</div><div class=\"t-body\"><p>600 yds easy freestyle.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 2,400 yds</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">10×200 yds</span><span class=\"z-tag\">Z2–Z3 · 135–165 BPM</span><span class=\"i-rest\">20 sec rest</span></div><p class=\"i-note\">Aim for even splits across all 10 reps. If you blow up after 6, you went too hard — Z3 is not all-out.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 500 yds</div><div class=\"t-body\"><p>Easy Z1 — deep breathing, long strokes.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>High-volume interval session. Conservative first 5 reps pay off on reps 7–10. Even splits across all 10 is the goal.</p></div>", "targetDuration": 85, "targetDistance": 3500, "unit": "yds"}, {"id": "w5-wed", "week": 5, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-06-24", "dayName": "WED", "type": "cf", "title": "CrossFit", "summary1": "Class · Scale before Saturday long session", "summary2": "No max effort — big session coming Saturday", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit k rest</span></div><p class=\"i-note\">Effort: comfortably hard. You should be working but not gasping. Target ~10:30–11:00/mi.</p></p><p>Interval 1: Build into Z2-3. Interval 2: Hold effort. Interval 3: Maintain — do not try to run faster.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 5 min</div><div class=\"t-body\"><p>5 min easy Z1 walk-jog.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>First interval run of the plan. The 3×10 min structure with 2-min walk rest introduces tempo-adjacent effort without blowing up recovery. The walk breaks are not weakness — they're structure.</p></div>", "targetDuration": 60, "targetDistance": 5.5, "unit": "mi"}, {"id": "w5-fri", "week": 5, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-06-26", "dayName": "FRI", "type": "cf", "title": "CrossFit", "summary1": "Class · Last session before long Saturday", "summary2": "Last CF before Saturday — scale intensity", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 1</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a very long session this Saturday — 4–5+ hours. Please consider that when programming.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Wednesday and Friday this week: keep metcons under 15 min and avoid leg-destroying volume (wall balls, lunges, box jumps in high volume). Monday is OK for intensity.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>Strength: 4×4 deadlift at 80% + 3×6 strict pull-ups. Metcon: 12-min AMRAP — 5 power cleans (moderate), 10 push-ups, 200m row.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Big training weeks demand intelligent CrossFit. Strength over conditioning this week.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w6-sat", "week": 6, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-06-27", "dayName": "SAT", "type": "swim", "title": "Wk 6 · Recovery Swim", "summary1": "3,500 yds SWIM — recovery Saturday · Recovery — swim replaces bike this ...", "summary2": "3,500 yds continuous easy", "detail": "<span class=\"chip\">3,500 yds SWIM — recovery Saturday</span><span class=\"chip\">Recovery — swim replaces bike this week</span><div class=\"t-block \"><div class=\"t-lbl\">SEE SWIM PRESCRIPTION</div><div class=\"t-body\"><p>This recovery week, the Saturday long session is a 3,500-yard continuous easy swim. See the Tuesday swim prescription format for detail.</p><p>No biking this Saturday. Full leg rest before Phase 2.</p></div></div>Recovery week. Legs rest completely. The swim recovers the aerobic system while resting the cycling muscles. Phase 2 will build directly from this freshness.", "targetDuration": 80, "targetDistance": null, "unit": "yds"}, {"id": "w6-sun", "week": 6, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-06-28", "dayName": "SUN", "type": "ar", "title": "Active Recovery", "summary1": "20–30 min easy walk · No intensity", "summary2": "Mobility: foam roll + stretching", "detail": "<span class=\"chip\">20–30 min</span><span class=\"chip\">Z1 only — no intensity</span><span class=\"chip\">Movement + Mobility</span><div class=\"t-block \"><div class=\"t-lbl\">MOVEMENT</div><div class=\"t-body\"><p>20-30 min easy walk. Outdoors preferred — sunlight and low-impact movement enhance recovery.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MOBILITY · 15 min</div><div class=\"t-body\"><p>Foam roll: Calves · IT band · Upper back · Lats. Stretch: Pigeon pose 60s each · Hip flexor lunge 45s each · Doorway chest stretch 30s each.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Sundays are not rest days — they're active recovery days. The difference matters. Movement at Z1 flushes lactate and accelerates adaptation.</p></div>", "targetDuration": 30, "targetDistance": null, "unit": null}, {"id": "w6-mon", "week": 6, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-06-29", "dayName": "MON", "type": "cf", "title": "CrossFit", "summary1": "Class · Phase 1 · Light — recovery week", "summary2": "Scale: light", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 1</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a recovery week — easy effort only.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Attend class but scale all loading to 60-70%. Skip max efforts. Prioritize movement quality.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>5×5 back squat at 65% + 10-min easy AMRAP: 5 ring rows, 10 push-ups, 15 GHD sit-ups or AbMat</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Recovery weeks absorb the previous week's training. Don't undo it with ego in the gym.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w6-tue", "week": 6, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-06-30", "dayName": "TUE", "type": "swim", "title": "Swim Tue", "summary1": "~3,500 yds · Z1–Z2 continuous — R", "summary2": "3,500 continuous easy — milestone", "detail": "<span class=\"chip\">~3,500 yds</span><span class=\"chip\">80–90 min</span><span class=\"chip\">Z1–Z2 continuous — RECOVERY</span><div class=\"t-block \"><div class=\"t-lbl\">FULL SESSION</div><div class=\"t-body\"><p>3,500 yds continuous easy. No stops. Pure aerobic effort — Z1 to low Z2 only (104–145 BPM).</p><p>Breathe bilaterally. Long relaxed strokes. Think about technique, not pace.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN</div><div class=\"t-body\"><p>Easy backstroke 200 yds after completing.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>This is your first significant continuous swim milestone. Phase 1 recovery week — let the body consolidate 5 weeks of training. Zero intensity. Your collegiate engine will carry you through 3,500 comfortably.</p></div>", "targetDuration": 80, "targetDistance": 3500, "unit": "yds"}, {"id": "w6-wed", "week": 6, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-07-01", "dayName": "WED", "type": "cf", "title": "CrossFit", "summary1": "Class · Scale before Saturday long session", "summary2": "No max effort — big session coming Saturday", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 1</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a recovery week — easy effort only.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Attend class but scale all loading to 60-70%. Skip max efforts. Prioritize movement quality.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>5×5 back squat at 65% + 10-min easy AMRAP: 5 ring rows, 10 push-ups, 15 GHD sit-ups or AbMat</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Recovery weeks absorb the previous week's training. Don't undo it with ego in the gym.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w6-thu", "week": 6, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-07-02", "dayName": "THU", "type": "run", "title": "Run", "summary1": "30 min · Z1–Z2 · RECOVERY", "summary2": "30 min easy Z1 only · recovery", "detail": "<span class=\"chip\">30 min</span><span class=\"chip\">~2.5 mi</span><span class=\"chip\">Z1–Z2 · RECOVERY</span><div class=\"t-block \"><div class=\"t-lbl\">FULL SESSION · 30 min</div><div class=\"t-body\"><p>30 min easy Z1–low Z2. Walk if HR rises above 145. This is deliberate recovery.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN</div><div class=\"t-body\"><p>5 min walk + stretch: pigeon pose, calf stretch.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Recovery week run. Going easy here is not \"taking it easy\" — it's programming. The fitness gains from the past 5 weeks consolidate during recovery weeks.</p></div>", "targetDuration": 30, "targetDistance": 2.5, "unit": "mi"}, {"id": "w6-fri", "week": 6, "phase": 1, "phaseName": "Foundation", "phaseColor": "#22C55E", "date": "2026-07-03", "dayName": "FRI", "type": "cf", "title": "CrossFit", "summary1": "Class · Last session before long Saturday", "summary2": "Light or full rest", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 1</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a recovery week — easy effort only.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Attend class but scale all loading to 60-70%. Skip max efforts. Prioritize movement quality.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>5×5 back squat at 65% + 10-min easy AMRAP: 5 ring rows, 10 push-ups, 15 GHD sit-ups or AbMat</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Recovery weeks absorb the previous week's training. Don't undo it with ego in the gym.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w7-sat", "week": 7, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-07-04", "dayName": "SAT", "type": "bike", "title": "Wk 7 · Long Ride", "summary1": "3 hrs · ⭐ FIRST 3-HOUR RIDE", "summary2": "First 3-hr ride · eat every 20 min", "detail": "<span class=\"chip\">3 hrs</span><span class=\"chip\">~57 mi</span><span class=\"chip\">⭐ FIRST 3-HOUR RIDE</span><div class=\"t-block \"><div class=\"t-lbl\">WARM-UP · 20 min</div><div class=\"t-body\"><p>20 min easy Z1.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 2:10 hrs</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">2:10 hrs continuous</span><span class=\"z-tag\">Z2 · 135–150 BPM · ~105–140W</span></div><p class=\"i-note\">⭐ Three hours on the bike. This is the first time you'll be on the bike longer than a casual ride. Pacing is everything — the 3rd hour should feel similar to the 1st hour.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 30 min</div><div class=\"t-body\"><p>30 min easy Z1. Spin out the legs.</p></div></div><div class=\"watts-note\">★ Watts estimated from modeled FTP "t-lbl\">MAIN SET · 3 hrs</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">2:30 hrs</span><span class=\"z-tag\">Z2 · 135–150 BPM · ~105–140W</span></div><p class=\"i-note\">Long Z2 aerobic base block.</p></p><p>—</p><p><div class=\"i-row\"><span class=\"i-desc\">30 min</span><span class=\"z-tag\">Z3 · 151–165 BPM · ~140–165W</span></div><p class=\"i-note\">⭐ Progression finish — push to Z3 for the last 30 min of 3 hours of riding. This is race-specific: going harder when tired is exactly what the IRONMAN bike demands late in the ride.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 15 min</div><div class=\"t-body\"><p>15 min easy Z1.</p></div></div><div class=\"watts-note\">★ Watts estimated from modeled FTP ~200W. Calibrate once power meter installed.</div><div class=\"nutr-note\"><span>🍌</span><p>Eat every 20 min throughout.</p></div>", "targetDuration": 210, "targetDistance": null, "unit": "mi"}, {"id": "w11-sun", "week": 11, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-02", "dayName": "SUN", "type": "ar", "title": "Active Recovery", "summary1": "20–30 min easy walk · No intensity", "summary2": "Mobility: foam roll + stretching", "detail": "<span class=\"chip\">20–30 min</span><span class=\"chip\">Z1 only — no intensity</span><span class=\"chip\">Movement + Mobility</span><div class=\"t-block \"><div class=\"t-lbl\">MOVEMENT</div><div class=\"t-body\"><p>20-30 min easy walk. Outdoors preferred — sunlight and low-impact movement enhance recovery.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MOBILITY · 15 min</div><div class=\"t-body\"><p>Foam roll: Calves · IT band · Upper back · Lats. Stretch: Pigeon pose 60s each · Hip flexor lunge 45s each · Doorway chest stretch 30s each.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Sundays are not rest days — they're active recovery days. The difference matters. Movement at Z1 flushes lactate and accelerates adaptation.</p></div>", "targetDuration": 30, "targetDistance": null, "unit": null}, {"id": "w11-mon", "week": 11, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-03", "dayName": "MON", "type": "cf", "title": "CrossFit", "summary1": "Class · Phase 2 · Scale if big Saturday ahead", "summary2": "Scale: moderate", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 2</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a very long session this Saturday — 4–5+ hours. Please consider that when programming.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Wednesday and Friday this week: keep metcons under 15 min and avoid leg-destroying volume (wall balls, lunges, box jumps in high volume). Monday is OK for intensity.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>Strength: 4×4 deadlift at 80% + 3×6 strict pull-ups. Metcon: 12-min AMRAP — 5 power cleans (moderate), 10 push-ups, 200m row.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Big training weeks demand intelligent CrossFit. Strength over conditioning this week.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w11-tue", "week": 11, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-04", "dayName": "TUE", "type": "swim", "title": "Swim Tue", "summary1": "~4,500 yds · Z3 + Z4 speed", "summary2": "4×500 Z3 + 6×100 Z4 speed", "detail": "<span class=\"chip\">~4,500 yds</span><span class=\"chip\">105–120 min</span><span class=\"chip\">Z3 + Z4 speed</span><div class=\"t-block \"><div class=\"t-lbl\">WARM-UP · 800 yds</div><div class=\"t-body\"><p>800 yds easy freestyle.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 3,300 yds</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">4×500 yds</span><span class=\"z-tag\">Z3 · 151–165 BPM</span><span class=\"i-rest\">30 sec rest</span></div><p class=\"i-note\">Your longest sustained Z3 intervals to date. Hold pace through all 4.</p></p><p>—</p><p><div class=\"i-row\"><span class=\"i-desc\">6×100 yds</span><span class=\"z-tag\">Z4 · 166–181 BPM</span><span class=\"i-rest\">20 sec rest</span></div><p class=\"i-note\">Speed work on fatigued muscles. Fast but controlled — not sprinting.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 400 yds</div><div class=\"t-body\"><p>Easy Z1.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Biggest week 1–11 swim. Z4 100s at the end are uncomfortable by design — they raise your anaerobic ceiling and make Z3 feel easier. Phase 2 peak swim.</p></div>", "targetDuration": 105, "targetDistance": 4500, "unit": "yds"}, {"id": "w11-wed", "week": 11, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-05", "dayName": "WED", "type": "cf", "title": "CrossFit", "summary1": "Class · Scale before Saturday long session", "summary2": "No max effort — big session coming Saturday", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 2</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a very long session this Saturday — 4–5+ hours. Please consider that when programming.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Wednesday and Friday this week: keep metcons under 15 min and avoid leg-destroying volume (wall balls, lunges, box jumps in high volume). Monday is OK for intensity.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>Strength: 4×4 deadlift at 80% + 3×6 strict pull-ups. Metcon: 12-min AMRAP — 5 power cleans (moderate), 10 push-ups, 200m row.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Big training weeks demand intelligent CrossFit. Strength over conditioning this week.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w11-thu", "week": 11, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-06", "dayName": "THU", "type": "run", "title": "Run", "summary1": "75 min · Z2 + Z3 progression", "summary2": "50 min Z2 + 10 min Z3 progression", "detail": "<span class=\"chip\">75 min</span><span class=\"chip\">~7 mi</span><span class=\"chip\">Z2 + Z3 progression</span><div class=\"t-block \"><div class=\"t-lbl\">WARM-UP · 10 min</div><div class=\"t-body\"><p>10 min easy Z1.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 60 min</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">50 min</span><span class=\"z-tag\">Z2 · 135–150 BPM</span></div><p class=\"i-note\">Long aerobic base.</p></p><p>—</p><p><div class=\"i-row\"><span class=\"i-desc\">10 min</span><span class=\"z-tag\">Z3 · 151–165 BPM</span></div><p class=\"i-note\">Finish the main set 10 minutes at Z3 — your highest sustained run effort to date. This \"progression\" format trains your body to push when fatigued.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 5 min</div><div class=\"t-body\"><p>5 min easy Z1.</p></div></div><div class=\"coac "2026-08-08", "dayName": "SAT", "type": "swim", "title": "Wk 12 · Recovery Swim", "summary1": "2 hrs easy OR Open Water Swim · RECOVERY — choose bike or OW swim", "summary2": "OW swim or easy 2-hr spin", "detail": "<span class=\"chip\">2 hrs easy OR Open Water Swim</span><span class=\"chip\">RECOVERY — choose bike or OW swim</span><div class=\"t-block \"><div class=\"t-lbl\">OPTION A — BIKE</div><div class=\"t-body\"><p>2 hrs purely Z1. Below 135 BPM the entire ride. No intervals, no pushing. Recovery spin.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">OPTION B — OPEN WATER (preferred)</div><div class=\"t-body\"><p>30–40 min open water swim. Practice sighting. No pace pressure. Explore the OW environment before your race.</p></div></div>Recovery week. If you have open water access, take it — every OW swim before race day is valuable. If biking: Z1 only. Do not let FOMO drive intensity this week.", "targetDuration": 120, "targetDistance": null, "unit": "yds"}, {"id": "w12-sun", "week": 12, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-09", "dayName": "SUN", "type": "ar", "title": "Active Recovery", "summary1": "20–30 min easy walk · No intensity", "summary2": "Mobility: foam roll + stretching", "detail": "<span class=\"chip\">20–30 min</span><span class=\"chip\">Z1 only — no intensity</span><span class=\"chip\">Movement + Mobility</span><div class=\"t-block \"><div class=\"t-lbl\">MOVEMENT</div><div class=\"t-body\"><p>20-30 min easy walk. Outdoors preferred — sunlight and low-impact movement enhance recovery.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MOBILITY · 15 min</div><div class=\"t-body\"><p>Foam roll: Calves · IT band · Upper back · Lats. Stretch: Pigeon pose 60s each · Hip flexor lunge 45s each · Doorway chest stretch 30s each.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Sundays are not rest days — they're active recovery days. The difference matters. Movement at Z1 flushes lactate and accelerates adaptation.</p></div>", "targetDuration": 30, "targetDistance": null, "unit": null}, {"id": "w12-mon", "week": 12, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-10", "dayName": "MON", "type": "cf", "title": "CrossFit", "summary1": "Class · Phase 2 · Light — recovery week", "summary2": "Scale: light", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 2</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a recovery week — easy effort only.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Attend class but scale all loading to 60-70%. Skip max efforts. Prioritize movement quality.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>5×5 back squat at 65% + 10-min easy AMRAP: 5 ring rows, 10 push-ups, 15 GHD sit-ups or AbMat</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Recovery weeks absorb the previous week's training. Don't undo it with ego in the gym.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w12-tue", "week": 12, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-11", "dayName": "TUE", "type": "swim", "title": "Swim Tue", "summary1": "~3,500 yds OR Open Water · Z1–Z2 · RECOVERY", "summary2": "OW sighting or easy 3,500", "detail": "<span class=\"chip\">~3,500 yds OR Open Water</span><span class=\"chip\">70–85 min</span><span class=\"chip\">Z1–Z2 · RECOVERY</span><div class=\"t-block \"><div class=\"t-lbl\">OPTION A — OPE P: 5 ring rows, 10 push-ups, 15 GHD sit-ups or AbMat</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Recovery weeks absorb the previous week's training. Don't undo it with ego in the gym.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w12-thu", "week": 12, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-13", "dayName": "THU", "type": "run", "title": "Run", "summary1": "35 min · Z1 only · RECOVERY", "summary2": "35 min Z1 only · recovery", "detail": "<span class=\"chip\">35 min</span><span class=\"chip\">~3 mi</span><span class=\"chip\">Z1 only · RECOVERY</span><div class=\"t-block \"><div class=\"t-lbl\">FULL SESSION · 35 min</div><div class=\"t-body\"><p>35 min Z1 only. Walk-jog. No pressure on pace or HR beyond \"very easy.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN</div><div class=\"t-body\"><p>Full mobility routine: hip flexors, IT band, quads, calves.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Recovery week — 35 min very easy. Phase 2 delivered 6 consecutive weeks of increasing run stimulus. This week lets the adaptation consolidate. Do not run faster because it feels easy.</p></div>", "targetDuration": 35, "targetDistance": 3.0, "unit": "mi"}, {"id": "w12-fri", "week": 12, "phase": 2, "phaseName": "Base Build", "phaseColor": "#0EA5E9", "date": "2026-08-14", "dayName": "FRI", "type": "cf", "title": "CrossFit", "summary1": "Class · Last session before long Saturday", "summary2": "Light or full rest", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 2</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I have a recovery week — easy effort only.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Attend class but scale all loading to 60-70%. Skip max efforts. Prioritize  class=\"t-lbl\">T1</div><div class=\"t-body\"><p>Transition — timing yourself now is useful data.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">RUN · 30 min</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">30 min easy</span><span class=\"z-tag\">Z1–Z2 · 104–150 BPM</span></div><p class=\"i-note\">3-mi brick run. This should be getting familiar.</p></p></div></div>", "targetDuration": 250, "targetDistance": null, "unit": "mi"}, {"id": "w13-sun", "week": 13, "phase": 3, "phaseName": "Build", "phaseColor": "#F59E0B", "date": "2026-08-16", "dayName": "SUN", "type": "ar", "title": "Active Recovery", "summary1": "20–30 min easy walk · No intensity", "summary2": "Mobility: foam roll + stretching", "detail": "<span class=\"chip\">20–30 min</span><span class=\"chip\">Z1 only — no intensity</span><span class=\"chip\">Movement + Mobility</span><div class=\"t-block \"><div class=\"t-lbl\">MOVEMENT</div><div class=\"t-body\"><p>30-min easy walk outdoors. Move but do not elevate HR above Z1 (104-134 BPM).</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MOBILITY · 15 min</div><div class=\"t-body\"><p>Foam roll: IT band 90s each · Calves 90s each · Quads 60s each · Hip flexors 60s each. Static stretch: pigeon pose 90s each side · Hamstring 60s each · Kneeling hip flexor 60s.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>You had a big brick yesterday. This is mandatory recovery — not optional training. Skipping mobility today means starting next week compromised.</p></div>", "targetDuration": 30, "targetDistance": null, "unit": null}, {"id": "w13-mon", "week": 13, "phase": 3, "phaseName": "Build", "phaseColor": "#F59E0B", "date": "2026-08-17", "dayName": "MON", "type": "cf", "title": "CrossFit", "summary1": "Class · Phase 3 · Phase 3 — tell coach about tra", "summary2": "Scale: full class", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 3</span><div cla "t-block \"><div class=\"t-lbl\">WARM-UP · 15 min</div><div class=\"t-body\"><p>15 min easy Z1.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 1:50 hrs</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">4×20 min at race effort</span><span class=\"z-tag\">Z2 · 135–150 BPM · ~105–140W</span><span class=\"i-rest\">5 min Z1 rest</span></div><p class=\"i-note\">Race pace reminders. Feel the effort — it should feel comfortable. That's correct.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 20 min</div><div class=\"t-body\"><p>20 min easy Z1.</p></div></div><div class=\"watts-note\">★ Watts estimated from modeled FTP ~200W. Calibrate once power meter installed.</div><div class=\"nutr-note\"><span>🍌</span><p>Use race-day nutrition products and timing.</p></div>", "targetDuration": 150, "targetDistance": null, "unit": "mi"}, {"id": "w23-sun", "week": 23, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-10-25", "dayName": "SUN", "type": "ar", "title": "Active Recovery", "summary1": "20–30 min easy walk · No intensity", "summary2": "Mobility: foam roll + stretching", "detail": "<span class=\"chip\">20–30 min</span><span class=\"chip\">Z1 only — no intensity</span><span class=\"chip\">Movement + Mobility</span><div class=\"t-block \"><div class=\"t-lbl\">MOVEMENT</div><div class=\"t-body\"><p>20-30 min easy walk. Outdoors preferred — sunlight and low-impact movement enhance recovery.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MOBILITY · 15 min</div><div class=\"t-body\"><p>Foam roll: Calves · IT band · Upper back · Lats. Stretch: Pigeon pose 60s each · Hip flexor lunge 45s each · Doorway chest stretch 30s each.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Sundays are not rest days — they're active recovery days. The difference matters. Movement at Z1 flushes lactate and accelerates adaptation.</p></div>", "targetDuration": 30, "targetDistance": null, "unit": null}, {"id": "w23-mon", "week": 23, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-10-26", "dayName": "MON", "type": "cf", "title": "CrossFit", "summary1": "Class · Phase 5 · Light — 2 weeks to race", "summary2": "Scale: light", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 5</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I'm training for an IRONMAN in November. This is phase 5 of my training.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Full class participation. If programming has running > 400m or cycling, keep effort conversational (Z2). Cap any single metcon at 20 min.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>Turkish get-ups 5 each side. Metcon: 4×4 min on/2 off — 10 KB swings, 10 goblet squats, 10 box jumps.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Phase 5 CrossFit: Strength maintenance only — endurance is the priority.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w23-tue", "week": 23, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-10-27", "dayName": "TUE", "type": "swim", "title": "Swim Tue", "summary1": "~3,000 yds + Wetsuit Practice · Race pace + wetsuit", "summary2": "Race pace + wetsuit practice", "detail": "<span class=\"chip\">~3,000 yds + Wetsuit Practice</span><span class=\"chip\">70–80 min</span><span class=\"chip\">Race pace + wetsuit</span><div class=\"t-block \"><div class=\"t-lbl\">WARM-UP · 600 yds</div><div class=\"t-body\"><p>600 yds easy freestyle.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 2,000 yds</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">3×500 yds</span><span class=\"z-tag\">Z2 · 135–150 BPM</span><span class=\"i-rest\">30 sec rest</span></div><p class=\"i-note\">Race pace. You know this effort well now.</p></p><p>—</p><p><div class=\"i-row\"><span class=\"i-desc\">4×50 yds</span><span class=\"z-tag\">Z4 — sprint</span><span class=\"i-rest\">20 sec rest</span></div><p class=\"i-note\">Quick turnover. Keep stroke long but push pace briefly.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 400 yds</div><div class=\"t-body\"><p>Easy Z1.</p></div></div><div class=\"coach-note\"><span>⚡</span><p><div class=\"t-block \"><div class=\"t-lbl\">WETSUIT</div><div class=\"t-body\"><p>If possible, wear your race wetsuit for at least 1,000 yards. Feel how it changes your body position (more buoyancy = higher hips). Practice the different feel.</p></div></div></p></div>", "targetDuration": 70, "targetDistance": 3000, "unit": "yds"}, {"id": "w23-wed", "week": 23, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-10-28", "dayName": "WED", "type": "cf", "title": "CrossFit", "summary1": "Class · Scale before Saturday long session", "summary2": "No max effort — big session coming Saturday", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 5</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I'm training for an IRONMAN in November. This is phase 5 of my training.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Full class participation. If programming has running > 400m or cycling, keep effort conversational (Z2). Cap any single metcon at 20 min.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>Turkish get-ups 5 each side. Metcon: 4×4 min on/2 off — 10 KB swings, 10 goblet squats, 10 box jumps.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Phase 5 CrossFit: Strength maintenance only — endurance is the priority.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w23-thu", "week": 23, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-10-29", "dayName": "THU", "type": "run", "title": "Run", "summary1": "60 min · Easy + race pace reminder", "summary2": "60 min easy + race pace segments", "detail": "<span class=\"chip\">60 min</span><span class=\"chip\">~5.5 mi</span><span class=\"chip\">Easy + race pace reminders</span><div class=\"t-block \"><div class=\"t-lbl\">WARM-UP · 10 min</div><div class=\"t-body\"><p>10 min easy Z1.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MAIN SET · 46 min</div><div class=\"t-body\"><p><div class=\"i-row\"><span class=\"i-desc\">4×8 min at 11:30/mi</span><span class=\"z-tag\">Z2 · 135–150 BPM</span><span class=\"i-rest\">2 min easy jog rest</span></div><p class=\"i-note\">Race-pace reminders. Your legs remember this effort. 8 minutes is short enough to feel easy.</p></p><p><div class=\"i-row\"><span class=\"i-desc\">6 min easy jog</span><span class=\"z-tag\">Z1</span></div><p class=\"i-note\">Flush out.</p></p></div></div><div class=\"t-block \"><div class=\"t-lbl\">COOL-DOWN · 4 min</div><div class=\"t-body\"><p>4 min easy walk.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Race-pace maintenance run. Two weeks out. 4×8 min at race pace feels comfortable — good. That's where it should feel after 23 weeks of training.</p></div>", "targetDuration": 60, "targetDistance": 5.5, "unit": "mi"}, {"id": "w23-fri", "week": 23, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-10-30", "dayName": "FRI", "type": "cf", "title": "CrossFit", "summary1": "Class · Last session before long Saturday", "summary2": "Last CF before Saturday — scale intensity", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 5</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"I'm training for an IRONMAN in November. This is phase 5 of my training.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Full class participation. If programming has running > 400m or cycling, keep effort conversational (Z2). Cap any single metcon at 20 min.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>Turkish get-ups 5 each side. Metcon: 4×4 min on/2 off — 10 KB swings, 10 goblet squats, 10 box jumps.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Phase 5 CrossFit: Strength maintenance only — endurance is the priority.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w24-sat", "week": 24, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-10-31", "dayName": "SAT", "type": "bike", "title": "Wk 24 · Long Ride", "summary1": "60 min · Race week shakeout · Race week — Z1 only", "summary2": "60-min shakeout + gear check", "detail": "<span class=\"chip\">60 min · Race week shakeout</span><span class=\"chip\">~15 mi</span><span class=\"chip\">Race week — Z1 only</span><div class=\"t-block \"><div class=\"t-lbl\">FULL SESSION · 60 min</div><div class=\"t-body\"><p>30 min easy Z1 spin — just feel the bike.</p><p>2×10 min at race effort — confirm legs feel sharp.</p><p>10 min easy cool-down.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SETUP</div><div class=\"t-body\"><p>After riding: clean and lube chain. Check tire pressure. Check brakes. Pack transition bags tonight.</p></div></div>⭐ Last ride before race day. This is pure activation. After today, you rest until race morning. Your job: arrive at T1 with a tuned bike, a calm mind, and confidence from 24 weeks of work.", "targetDuration": 60, "targetDistance": null, "unit": "mi"}, {"id": "w24-sun", "week": 24, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-11-01", "dayName": "SUN", "type": "ar", "title": "Active Recovery", "summary1": "20–30 min easy walk · No intensity", "summary2": "Mobility: foam roll + stretching", "detail": "<span class=\"chip\">20–30 min</span><span class=\"chip\">Z1 only — no intensity</span><span class=\"chip\">Movement + Mobility</span><div class=\"t-block \"><div class=\"t-lbl\">MOVEMENT</div><div class=\"t-body\"><p>Rest completely or take a 15-min walk outdoors. Stay off your feet as much as possible.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MOBILITY · 15 min</div><div class=\"t-body\"><p>Light: calf stretch (2 min each), quad stretch, hip flexor lunge. That's it.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Race is 6 days away. Your job today: hydrate, eat well, sleep early. Do nothing that creates fatigue.</p></div>", "targetDuration": 30, "targetDistance": null, "unit": null}, {"id": "w24-mon", "week": 24, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-11-02", "dayName": "MON", "type": "cf", "title": "CrossFit", "summary1": "Class · Phase 5 · Very light — race week", "summary2": "Scale: very light", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 5</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"It's race week — I race IRONMAN Florida on Saturday.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Scale everything to 50% or less. No heavy loading, no long metcons. Mobility and activation only.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>10-min easy row or bike erg + 3 rounds: 10 air squats, 10 banded pull-aparts, 10 dead bugs. Done.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>One job this week: arrive at the start line healthy and rested.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w24-tue", "week": 24, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-11-03", "dayName": "TUE", "type": "swim", "title": "Swim Tue", "summary1": "~2,000 yds · Race Week · Z1–Z2 only", "summary2": "2,000 easy race week activation", "detail": "<span class=\"chip\">~2,000 yds · Race Week</span><span class=\"chip\">45–55 min</span><span class=\"chip\">Z1–Z2 only</span><div class=\"t-block \"><div class=\"t-lbl\">FULL SESSION · 2,000 yds</div><div class=\"t-body\"><p>400 yds easy warm-up. 4×100 yds drills of your choice. 800 yds easy aerobic Z2. 4×50 yds at comfortable pace. 200 yds easy cool-down.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MENTAL PREP</div><div class=\"t-body\"><p>Visualize your race-morning swim. Entry, first buoy, sighting routine. This is the last time you'll feel the water before race day.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Race week. This is not training — it's activation. Keep HR in Z1–Z2 throughout. The goal is to feel the water and keep your feel without creating any fatigue.</p></div>", "targetDuration": 45, "targetDistance": 2000, "unit": "yds"}, {"id": "w24-wed", "week": 24, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-11-04", "dayName": "WED", "type": "cf", "title": "CrossFit", "summary1": "Class · Scale before Saturday long session", "summary2": "No max effort — big session coming Saturday", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 5</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"It's race week — I race IRONMAN Florida on Saturday.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Scale everything to 50% or less. No heavy loading, no long metcons. Mobility and activation only.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>10-min easy row or bike erg + 3 rounds: 10 air squats, 10 banded pull-aparts, 10 dead bugs. Done.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>One job this week: arrive at the start line healthy and rested.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "w24-thu", "week": 24, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-11-05", "dayName": "THU", "type": "run", "title": "Run", "summary1": "20 min · Race week shakeout", "summary2": "20 min easy race week shakeout", "detail": "<span class=\"chip\">20 min</span><span class=\"chip\">~1.5 mi</span><span class=\"chip\">Race week shakeout</span><div class=\"t-block \"><div class=\"t-lbl\">FULL SESSION · 20 min</div><div class=\"t-body\"><p>20 min easy Z1 jog. Just moving. No tracking pace.</p><p>2 min walk. Gear check. Pack transition bags tonight.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">MENTAL PREP</div><div class=\"t-body\"><p>Visualize your race-day run. T2 exit, first mile, settling in, miles 8–16, the back half. You've run this far in training. Trust it.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>Race week shakeout. This is maintenance only — there is zero fitness to be gained in the last 5 days. Your only job: arrive healthy, rested, and confident.</p></div>", "targetDuration": 20, "targetDistance": 1.5, "unit": "mi"}, {"id": "w24-fri", "week": 24, "phase": 5, "phaseName": "Taper", "phaseColor": "#A855F7", "date": "2026-11-06", "dayName": "FRI", "type": "cf", "title": "CrossFit", "summary1": "Class · Last session before long Saturday", "summary2": "Light or full rest", "detail": "<span class=\"chip\">~60 min</span><span class=\"chip\">CrossFit Class</span><span class=\"chip\">Phase 5</span><div class=\"t-block \"><div class=\"t-lbl\">WHAT TO TELL YOUR COACH</div><div class=\"t-body\"><p>\"It's race week — I race IRONMAN Florida on Saturday.\"</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">SCALING GUIDANCE</div><div class=\"t-body\"><p>Scale everything to 50% or less. No heavy loading, no long metcons. Mobility and activation only.</p><p><strong>Squats, deadlifts, pull-ups:</strong> ✅ Direct triathlon benefit.</p><p><strong>Running / cycling WODs:</strong> Keep at Z2 — not the day to PR a 400m sprint.</p><p><strong>Heavy Olympic lifts:</strong> OK on Monday. Scale on Wed/Fri before Saturday long session.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">IF OPEN GYM / CHOICE</div><div class=\"t-body\"><p>10-min easy row or bike erg + 3 rounds: 10 air squats, 10 banded pull-aparts, 10 dead bugs. Done.</p></div></div><div class=\"coach-note\"><span>⚡</span><p>One job this week: arrive at the start line healthy and rested.</p></div>", "targetDuration": 60, "targetDistance": null, "unit": null}, {"id": "race-day", "week": 25, "phase": 5, "phaseName": "Race Day", "phaseColor": "#E8002D", "date": "2026-11-07", "dayName": "SAT", "type": "race", "title": "🏁 RACE DAY — IRONMAN FLORIDA", "summary1": "140.6 mi · Nov 7, 2026 · Panama City Beach", "summary2": "Goal: sub-12:00:00 · YOU ARE AN IRONMAN", "detail": "<span class=\"chip\">140.6 miles</span><span class=\"chip\">12:00:00 goal</span><span class=\"chip\">Nov 7, 2026 · Panama City Beach</span><div class=\"t-block \"><div class=\"t-lbl\">SWIM · 2.4 mi</div><div class=\"t-body\"><p>Warm water Gulf swim. Wetsuit expected — extra buoyancy. Sight every 6–8 strokes. Start conservatively — you'll feel the urge to chase early swimmers. Resist it.</p><p>Target: 0:55:00 (1:25/100m)</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">T1</div><div class=\"t-body\"><p>Wetsuit strippers available. Run to your rack. Helmet on before touching the bike. Target: 0:05:00.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">BIKE · 112 mi</div><div class=\"t-body\"><p>Flat course — Panama City Beach is fast. Ride to power/HR, not speed. First 30 miles: hold back, HR must stay in Z2. Eat every 20 min. Drink every 15 min. The marathon starts here.</p><p>Target: 5:36:00 (20 mph)</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">T2</div><div class=\"t-body\"><p>Rack bike. Helmet off. Race shoes + hat + bib. Target: 0:05:00.</p></div></div><div class=\"t-block \"><div class=\"t-lbl\">RUN · 26.2 mi</div><div class=\"t-body\"><p>Walk through every aid station — get fluid in. First 6 miles: feels amazing — DO NOT run faster than 11:30/mi. Miles 7–16: settle into rhythm. Miles 17–26: this is where 24 weeks of training shows. Dig deep.</p><p let completions = JSON.parse(localStorage.getItem('imfl-completions')||'{}');
let positions   = JSON.parse(localStorage.getItem('imfl-positions')||'{}');

function saveCompletions(){ localStorage.setItem('imfl-completions',JSON.stringify(completions)); }
function savePositions(){ localStorage.setItem('imfl-positions',JSON.stringify(positions)); }

// ── Effective date of a session ──
function effectiveDate(s){
  return positions[s.id] || s.date;
}

// ── Sorted sessions by effective date ──
function sortedSessions(){
  return [...PLAN].sort((a,b)=>(effectiveDate(a)<effectiveDate(b)?-1:1));
}

// ── Today / Tomorrow ──
function getTodayTomorrow(){
  const today = new Date().toISOString().split('T')[0];
  const tomorrow = new Date(Date.now()+864e5).toISOString().split('T')[0];
  const sorted = sortedSessions();
  const todaySessions = sorted.filter(s=>effectiveDate(s)===today);
  const tomSessions   = sorted.filter(s=>effectiveDate(s)===tomorrow);
  const todaySession  = todaySessions.find(s=>s.type!=='ar'&&s.type!=='cf') || todaySessions[0] || null;
  const tomSession    = tomSessions.find(s=>s.type!=='ar'&&s.type!=='cf')   || tomSessions[0]   || null;
  return {todaySession, tomSession};
}

// ── Stats ──
function calcStats(){
  let swimYds=0, bikeMi=0, runMi=0, totalMin=0, done=0;
  PLAN.forEach(s=>{
    const c = completions[s.id];
    if(c){
      done++;
      totalMin += c.duration||0;
      if(s.type==='swim'||s.type==='swimrun') swimYds += c.distance||0;
      else if(s.type==='bike'||s.type==='brick') bikeMi += c.distance||0;
      else if(s.type==='run') runMi += c.distance||0;
    }
  });
  const hrs = Math.floor(totalMin/60), mins = totalMin%60;
  return { swimYds, bikeMi: bikeMi.toFixed(1), runMi: runMi.toFixed(1),
           totalTime: `${hrs}:${String(mins).padStart(2,'0')}`, done, total: PLAN.length };
}

// ── Render stats ──
function renderStats(){
  const st = calcStats();
  const days = Math.max(0, Math.ceil((new Date('2026-11-07')-new Date())/864e5));
  document.getElementById('countdown').textContent = days+' days';
  document.getElementById('stat-swim').textContent = st.swimYds.toLocaleString()+' yds';
  document.getElementById('stat-bike').textContent = st.bikeMi+' mi';
  document.getElementById('stat-run').textContent  = st.runMi+' mi';
  document.getElementById('stat-time').textContent = st.totalTime+' hrs';
  const pct = Math.round(st.done/st.total*100);
  document.getElementById('prog-fill').style.width  = pct+'%';
  document.getElementById('prog-text').textContent = `${st.done} / ${st.total} sessions (${pct}%)`;
}

// ── Type info ──
const TYPE = {
  swim:{color:'#38BDF8',label:'SWIM'}, bike:{color:'#FCD34D',label:'BIKE'},
  run:{color:'#F87171',label:'RUN'}, cf:{color:'#4ADE80',label:'CF'},
  brick:{color:'#C084FC',label:'BRICK'}, ar:{color:'#9CA3AF',label:'RECOVERY'},
  swimrun:{color:'#38BDF8',label:'SWIM+RUN'}, race:{color:'#E8002D',label:'RACE'},
};

function typeMeta(t){ return TYPE[t]||{color:'#888',label:'?'}; }

// ── Badge HTML ──
function badge(t){
  const m=typeMeta(t);
  return `<span class="sc-badge badge-${t}" style="background:${m.color}22;color:${m.color};border:1px solid ${m.color}44">${m.label}</span>`;
}

// ── Session card HTML ──
function sessionCardHTML(s, draggable=true){
  const done = !!completions[s.id];
  if(s.id==='race-day') return `
    <div class="race-day-card" onclick="openModal('race-day')">
      <div class="rdc-label">NOVEMBER 7, 2026</div>
      <div class="rdc-title">🏁 IRONMAN FLORIDA</div>
      <div class="rdc-sub">Panama City Beach · 140.6 miles · Sub-12:00:00</div>
    </div>`;
  return `
    <div class="session-card ${done?'done':''}" id="card-${s.id}"
         ${draggable?'draggable="true"':''} data-id="${s.id}"
         onclick="openModal('${s.id}')"
         ondragstart="onDragStart(event,'${s.id}')"
         ondragend="onDragEnd(event,'${s.id}')">
      <div class="sc-top">${badge(s.type)}<span class="sc-title">${s.title}</span></div>
      <div class="sc-s1">${s.summary1}</div>
      <div class="sc-s2">${s.summary2}</div>
    </div>`;
}

// ── Today/Tomorrow panel ──
function renderTodayTomorrow(){
  const {todaySession, tomSession} = getTodayTomorrow();
  renderPreview('today', todaySession, true);
  renderPreview('tomorrow', tomSession, false);
}

function renderPreview(slot, s, showForm){
  const container = document.getElementById(slot+'-content');
  if(!s){ container.innerHTML=`<div class="sp-none">No session scheduled${slot==='today'?' today':' tomorrow'}.<br><span style="font-size:11px;color:#333">Drag a session here to schedule it.</span></div>`; return; }
  const done = completions[s.id];
  const m = typeMeta(s.type);
  const headerHTML=`
    <div class="sp-header" style="border-left:3px solid ${m.color}">
      ${badge(s.type)}
      <div>
        <div style="font-family:var(--oswald);font-size:15px;font-weight:700;letter-spacing:.04em">${s.title}</div>
        <div style="font-size:11px;color:var(--muted)">${s.dayName} · Wk ${s.week} · ${s.phaseName}</div>
      </div>
    </div>`;
  const bodyHTML=`<div class="sp-body">${s.detail}</div>`;
  let formHTML='';
  if(showForm){
    if(done){
      const c=completions[s.id];
      formHTML=`<div class="log-form"><div class="completed-badge">✓ Logged: ${c.distance||'—'} ${s.unit||''} · ${c.duration||'—'} min</div></div>`;
    } else {
      const hasUnit = s.unit;
      formHTML=`
        <div class="log-form">
          <div class="log-form-row">
            <label class="log-check"><input type="checkbox" id="chk-${slot}" onchange="toggleForm('${slot}')"> Mark complete</label>
          </div>
          <div id="form-fields-${slot}" style="display:none;margin-top:6px">
            <div class="log-form-row">
              ${hasUnit?`<input class="log-input" type="number" id="inp-dist-${slot}" placeholder="Dist" step="0.1" min="0"><span class="log-unit">${s.unit}</span>`:''}
              <input class="log-input time-input" type="text" id="inp-dur-${slot}" placeholder="Min">
              <span class="log-unit">min</span>
              <button class="log-btn" onclick="logWorkout('${s.id}','${slot}','${s.unit||''}')">SAVE</button>
            </div>
          </div>
        </div>`;
    }
  }
  container.innerHTML=headerHTML+bodyHTML+formHTML;
}

function toggleForm(slot){
  const chk=document.getElementById('chk-'+slot);
  const fields=document.getElementById('form-fields-'+slot);
  if(fields) fields.style.display=chk.checked?'block':'none';
}

function logWorkout(sid, slot, unit){
  const distEl=document.getElementById('inp-dist-'+slot);
  const durEl=document.getElementById('inp-dur-'+slot);
  const dist=distEl?parseFloat(distEl.value)||0:0;
  const dur=parseInt(durEl?.value)||0;
  completions[sid]={done:true,distance:dist,duration:dur,loggedAt:new Date().toISOString(),unit};
  saveCompletions();
  renderStats();
  renderTodayTomorrow();
  renderCalendar();
}

// ── Modal ──
function openModal(sid){
  const s=PLAN.find(x=>x.id===sid); if(!s) return;
  const m=typeMeta(s.type);
  const done=completions[sid];
  document.getElementById('modal-badge').innerHTML=badge(s.type);
  document.getElementById('modal-title').textContent=s.title;
  document.getElementById('modal-meta').textContent=`${s.dayName} · Week ${s.week} · ${s.phaseName}`;
  document.getElementById('modal-body').innerHTML=s.detail;
  const logDiv=document.getElementById('modal-log');
  if(done){
    const c=completions[sid];
    logDiv.innerHTML=`<div class="completed-badge" style="margin-top:12px">✓ Logged: ${c.distance||'—'} ${s.unit||''} · ${c.duration||'—'} min on ${new Date(c.loggedAt).toLocaleDateString()}</div>
      <button style="margin-left:10px;padding:4px 10px;background:transparent;border:1px solid var(--dim);border-radius:5px;color:var(--muted);cursor:pointer;font-size:11px" onclick="clearLog('${sid}')">Clear</button>`;
  } else {
    const hu=s.unit?`<input class="log-input" type="number" id="m-dist" placeholder="Distance" step="0.1" min="0"><span class="log-unit">${s.unit}</span>`:'';
    logDiv.innerHTML=`<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.07em">Log this session</div>
      <div class="log-form-row">${hu}
        <input class="log-input time-input" type="text" id="m-dur" placeholder="Min"><span class="log-unit">min</span>
        <button class="log-btn" onclick="logFromModal('${sid}','${s.unit||''}')">SAVE LOG</button>
      </div></div>`;
  }
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function logFromModal(sid, unit){
  const dist=parseFloat(document.getElementById('m-dist')?.value)||0;
  const dur=parseInt(document.getElementById('m-dur')?.value)||0;
  completions[sid]={done:true,distance:dist,duration:dur,loggedAt:new Date().toISOString(),unit};
  saveCompletions();
  renderStats(); renderTodayTomorrow(); renderCalendar();
  openModal(sid);
}

function clearLog(sid){ delete completions[sid]; saveCompletions(); renderStats(); renderTodayTomorrow(); renderCalendar(); openModal(sid); }
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }
document.getElementById('modal-overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });

// ── Calendar ──
const PHASE_CONFIG = [
  {phase:1,name:'Foundation',color:'#22C55E',weeks:[1,2,3,4,5,6]},
  {phase:2,name:'Base Build',color:'#0EA5E9',weeks:[7,8,9,10,11,12]},
  {phase:3,name:'Build',color:'#F59E0B',weeks:[13,14,15,16,17,18]},
  {phase:4,name:'Peak',color:'#E8002D',weeks:[19,20,21]},
  {phase:5,name:'Taper & Race',color:'#A855F7',weeks:[22,23,24,'race']},
];

const DAYS=['SAT','SUN','MON','TUE','WED','THU','FRI'];

function getWeekSessions(wk){
  const sessions={};
  DAYS.forEach(d=>sessions[d]=[]);
  PLAN.forEach(s=>{
    if(s.week===wk){
      const day=s.dayName;
      if(sessions[day]) sessions[day].push(s);
    }
  });
  // Also check dragged sessions
  PLAN.forEach(s=>{
    const ed=positions[s.id];
    if(!ed) return;
    // find which week/day this date falls in
    const d=new Date(ed+'T12:00:00');
    const wkStart=new Date('2026-05-23');
    wkStart.setDate(wkStart.getDate()+(wk-1)*7);
    const wkEnd=new Date(wkStart); wkEnd.setDate(wkEnd.getDate()+7);
    if(d>=wkStart&&d<wkEnd&&s.week!==wk){
      const dayOff=Math.round((d-wkStart)/(864e5));
      const dayName=DAYS[dayOff];
      if(sessions[dayName]&&!sessions[dayName].find(x=>x.id===s.id)) sessions[dayName].push(s);
    }
  });
  return sessions;
}

function weekDateRange(wk){
  const s=new Date('2026-05-23'); s.setDate(s.getDate()+(wk-1)*7);
  const e=new Date(s); e.setDate(e.getDate()+6);
  const fmt=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  return `${fmt(s)} – ${fmt(e)}`;
}

let dragId=null;

function onDragStart(ev,sid){ dragId=sid; ev.dataTransfer.effectAllowed='move'; setTimeout(()=>{ const el=document.getElementById('card-'+sid); if(el) el.classList.add('dragging'); },0); }
function onDragEnd(ev,sid){ const el=document.getElementById('card-'+sid); if(el) el.classList.remove('dragging'); dragId=null; document.querySelectorAll('.drop-placeholder,.day-col').forEach(el=>el.classList.remove('active','drag-over')); }

function onDragOver(ev,colEl){ ev.preventDefault(); ev.dataTransfer.dropEffect='move'; colEl.classList.add('drag-over'); }
function onDragLeave(ev,colEl){ colEl.classList.remove('drag-over'); }
function onDrop(ev,dateStr,colEl){ ev.preventDefault(); colEl.classList.remove('drag-over');
  if(!dragId) return;
  positions[dragId]=dateStr; savePositions(); renderCalendar(); renderTodayTomorrow(); dragId=null;
}

function renderCalendar(){
  const cal=document.getElementById('calendar');
  let html='';

  PHASE_CONFIG.forEach(ph=>{
    html+=`<div class="phase-banner" style="background:${ph.color}18;border:1px solid ${ph.color}44">
      <div class="phase-bar" style="background:${ph.color}44"></div>
      <div class="phase-name" style="color:${ph.color}">${ph.name}</div>
      <div class="phase-weeks" style="color:${ph.color}aa">Phase ${ph.phase} · Weeks ${ph.weeks[0]}–${ph.weeks[ph.weeks.length-1]}</div>
      <div class="phase-bar" style="background:${ph.color}44"></div>
    </div>`;

    ph.weeks.forEach(wk=>{
      if(wk==='race'){
        const rs=PLAN.find(s=>s.id==='race-day');
        if(rs) html+=`<div style="margin-bottom:12px">${sessionCardHTML(rs,false)}</div>`;
        return;
      }
      const sessions=getWeekSessions(wk);
      html+=`<div class="week-row"><div class="week-label">Week ${wk} · ${weekDateRange(wk)}</div><div class="week-grid">`;
      DAYS.forEach((day,di)=>{
        const dateStr=new Date(new Date('2026-05-23').getTime()+((wk-1)*7+di)*864e5).toISOString().split('T')[0];
        const daySessions=sessions[day]||[];
        html+=`<div class="day-col" ondragover="onDragOver(event,this)" ondragleave="onDragLeave(event,this)" ondrop="onDrop(event,'${dateStr}',this)">
          <div class="day-header">${day}</div>
          ${daySessions.map(s=>sessionCardHTML(s)).join('')}
          ${daySessions.length===0?`<div class="drop-placeholder">+</div>`:''}
        </div>`;
      });
      html+='</div></div>';
    });
  });

  cal.innerHTML=html;
}

// ── Init ──
renderStats();
renderTodayTomorrow();
renderCalendar();
